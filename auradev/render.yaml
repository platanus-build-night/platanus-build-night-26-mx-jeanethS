services:
  - type: web
    name: auradev-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DB_DIR
        value: /data
    disk:
      name: auradev-db
      mountPath: /data
      sizeGB: 1
